name: WAT — Scraper Diário

on:
  schedule:
    - cron: "0 11 * * *"   # 08:00 BRT (UTC-3) = 11:00 UTC
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Instalar libs do Chromium (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 \
            libgbm1 libasound2t64 libxrandr2

      - name: Rodar scraper
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: npm run scrape

      - name: Salvar estado e resultados no repositório
        run: |
          git config user.name "WAT Bot"
          git config user.email "wat-bot@noreply"
          git add estado.json resultados/
          git diff --staged --quiet || git commit -m "Resultados $(date +%Y-%m-%d)"
          git push
